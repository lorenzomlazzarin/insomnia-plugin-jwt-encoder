name: Check package version bump

on:
  pull_request:
    branches:
      - main

jobs:
  check-version:
    name: Ensure package version was updated
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current and previous versions
        id: versions
        run: |
          PR_VERSION=$(jq -r .version package.json)
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:package.json | jq -r .version)

          echo "PR version: $PR_VERSION"
          echo "Main version: $MAIN_VERSION"

          # Quebrar em major.minor.patch
          IFS='.' read -r PR_MAJOR PR_MINOR PR_PATCH <<< "$PR_VERSION"
          IFS='.' read -r MAIN_MAJOR MAIN_MINOR MAIN_PATCH <<< "$MAIN_VERSION"

          # Função para contar diferenças
          DIFF_COUNT=0
          if [ "$PR_MAJOR" -ne "$MAIN_MAJOR" ]; then DIFF_COUNT=$((DIFF_COUNT + 1)); fi
          if [ "$PR_MINOR" -ne "$MAIN_MINOR" ]; then DIFF_COUNT=$((DIFF_COUNT + 1)); fi
          if [ "$PR_PATCH" -ne "$MAIN_PATCH" ]; then DIFF_COUNT=$((DIFF_COUNT + 1)); fi

          # Verifica se a versão do PR é maior
          VERSION_BIGGER=false
          if [ "$PR_MAJOR" -gt "$MAIN_MAJOR" ] || 
            [ "$PR_MAJOR" -eq "$MAIN_MAJOR" ] && [ "$PR_MINOR" -gt "$MAIN_MINOR" ] ||
            [ "$PR_MAJOR" -eq "$MAIN_MAJOR" ] && [ "$PR_MINOR" -eq "$MAIN_MINOR" ] && [ "$PR_PATCH" -gt "$MAIN_PATCH" ]; then
              VERSION_BIGGER=true
          fi

          if [ "$VERSION_BIGGER" = true ] && [ "$DIFF_COUNT" -eq 1 ]; then
              echo "✅ Version was updated correctly (only one number increased)."
          else
              echo "❌ Version in package.json is invalid. Must increase exactly one number from main and be greater than main."
              exit 1
          fi
