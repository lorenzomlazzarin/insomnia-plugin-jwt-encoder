name: Check dependencies

on:
  pull_request:
    branches:
      - main

jobs:
  install-dependencies:
    name: Verify npm dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          echo "🔹 Installing dependencies..."
          npm ci --silent
